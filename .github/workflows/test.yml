name: test

on:
  push:
    branches: [main]
    paths-ignore:
      - "web/**"
      - "docs/**"
      - "examples/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "web/**"
      - "docs/**"
      - "examples/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check boardwright/
        continue-on-error: true  # advisory until cleanup pass; tracked in docs/PROJECT.md

      - name: Typecheck (mypy)
        run: mypy boardwright/
        continue-on-error: true  # advisory until type hints land

      - name: Test (pytest)
        run: pytest tests/ -v
